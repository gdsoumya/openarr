name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx eslint . --max-warnings 100
      - run: npx tsc --noEmit
      - run: npx jest --ci --no-cache
      - name: Bundle check (android export)
        run: npx expo export --platform android
        env:
          EXPO_NO_TELEMETRY: '1'
